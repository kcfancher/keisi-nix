name: ci

on:
  pull_request:
  push:
    branches: [ main ]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: stable
          cache: true

      # templ output is committed (STACK.md) — fail if it drifted.
      - name: templ up to date
        run: |
          go tool templ generate
          git diff --exit-code -- '**/*_templ.go' \
            || { echo "::error::*_templ.go is stale — run 'go tool templ generate' and commit"; exit 1; }

      - name: vet & test
        run: go vet ./... && go test ./...

      # Prove the deploy artifact builds exactly as CI will ship it.
      - name: build static binary
        run: CGO_ENABLED=0 go build -trimpath -ldflags "-s -w" -o /dev/null ./cmd/server
